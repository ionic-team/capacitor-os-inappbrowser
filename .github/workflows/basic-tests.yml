name: "Basic Tests"

on:
  pull_request:
    types:
      - 'synchronize'
      - 'opened'

jobs:
  setup:
    uses: ./.github/workflows/reusable_setup.yml

  lint-test:
    needs: 'setup'
    uses: ./.github/workflows/reusable_lint.yml

  build-packages:
    needs: 'setup'
    uses: ./.github/workflows/reusable_build.yml

  verify:
    needs: 'setup'
    runs-on: 'macos-15'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 'Setup Tools'
        uses: ./.github/actions/setup-tools

      - name: 'Verify'
        shell: bash
        run: npm run verify